<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BEARCLAW — Protect Your Claws</title>
  <meta name="description" content="Le premier coating technique conçu pour les coureurs de trail et de running. Fini les ongles noirs, les hématomes, les ongles qui tombent." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:ital,wght@0,300;0,400;0,500;0,700;1,300&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body { background: #080706; }
    ::selection { background: #B8963E; color: #080706; }
    input::placeholder { color: rgba(237,232,223,0.35); }
    input:focus, select:focus { outline: none; border-color: rgba(184,150,62,0.4) !important; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">

const GOLD        = "#B8963E";
const GOLD_DIM    = "rgba(184,150,62,0.13)";
const GOLD_BORDER = "rgba(184,150,62,0.22)";
const BG          = "#080706";
const BG2         = "#0d0b09";
const TEXT        = "#EDE8DF";
const MUTED       = "rgba(237,232,223,0.45)";
const DIMMER      = "rgba(237,232,223,0.18)";

const HERO_IMG   = "https://res.cloudinary.com/dlaqcjmad/image/upload/f_auto,q_auto/Bearclaw_Hero_nya1jn";
const IMG_TRAIL  = "https://images.unsplash.com/photo-1594882645126-14020914d58d?w=900&q=85";
const IMG_ROCK   = "https://images.unsplash.com/photo-1533240332313-0db49b459ad6?w=900&q=85";
const IMG_FINISH = "https://images.unsplash.com/photo-1502224562085-639556652f33?w=900&q=85";

const stats = [
  { value:"2–14%", label:"des marathoniens perdent un ongle par saison" },
  { value:"240M+", label:"sportifs concernés dans le monde" },
  { value:"0",     label:"produit conçu pour ça jusqu'ici" },
];
const problems = [
  { num:"01", title:"L'hématome",          desc:"Le sang s'accumule sous l'ongle après des kilomètres de frottement contre la chaussure. Ça noircit, ça gonfle, ça fait mal." },
  { num:"02", title:"L'ongle qui tombe",   desc:"Le nail bed se décolle. L'ongle part. Long à repousser, parfois déformé. Toujours au pire moment de la saison." },
  { num:"03", title:"L'infection qui suit",desc:"Un ongle fragilisé est une porte d'entrée pour les champignons. Le problème devient chronique et difficile à traiter." },
];
const features = [
  { title:"Film protecteur technique",        desc:"Coating haute résistance qui absorbe les micro-impacts répétés sans se fissurer ni se décoller." },
  { title:"Renforcement à la kératine",       desc:"Pénètre la structure de l'ongle pour le renforcer de l'intérieur. Pas juste une couche de surface." },
  { title:"Tenue 7 jours transpiration",      desc:"Formulé pour résister à la sueur intensive, l'humidité et le frottement prolongé dans la chaussure." },
  { title:"Finition mat. Discret. Invisible.",desc:"Sous une chaussette, ça ne se voit pas. C'est de l'équipement de protection, pas du maquillage." },
];
const faqs = [
  { q:"C'est quoi exactement BEARCLAW ?",            a:"Un coating protecteur pour ongles de pieds, formulé pour résister aux contraintes mécaniques du sport intensif. Dureté, flexibilité, tenue longue durée sous transpiration. Pas un vernis cosmétique ordinaire." },
  { q:"Est-ce que les hommes utilisent vraiment ça ?",a:"Les hommes qui perdent des ongles après un trail, oui. Ce n'est pas un vernis — c'est un équipement de protection. Finition noire mate ou transparente. Invisible sous une chaussette." },
  { q:"Pourquoi rejoindre la liste ?",                a:"On valide la demande avant de lancer la production. Les inscrits seront les premiers informés et bénéficieront d'un prix fondateur exclusif." },
  { q:"Quand est-ce que le produit sera disponible ?",a:"Estimation honnête : dans les 4 à 6 mois. On ne promet pas ce qu'on ne peut pas tenir. Tu seras informé à chaque étape." },
];

function Tag({ children }) {
  return React.createElement('div', {
    style:{ display:'inline-flex', alignItems:'center', gap:10, marginBottom:22 }
  },
    React.createElement('div', { style:{ width:20, height:1, background:GOLD, flexShrink:0 } }),
    React.createElement('span', { style:{ fontSize:10, letterSpacing:'0.25em', color:GOLD, fontFamily:"'Barlow',sans-serif", fontWeight:500, textTransform:'uppercase' } }, children)
  );
}

async function subscribe(email, sport) {
  const response = await fetch("/api/subscribe", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ email, sport }),
  });
  if (!response.ok) {
    const err = await response.json().catch(() => ({}));
    throw new Error(err.message || "Erreur serveur");
  }
  return true;
}

function App() {
  const [email, setEmail]         = React.useState('');
  const [sport, setSport]         = React.useState('');
  const [consent, setConsent]     = React.useState(false);
  const [submitted, setSubmitted] = React.useState(false);
  const [loading, setLoading]     = React.useState(false);
  const [error, setError]         = React.useState('');

  const submit = async () => {
    if (!email) { setError("Merci d'entrer ton email."); return; }
    if (!consent) { setError("Merci d'accepter de recevoir nos communications pour continuer."); return; }
    setLoading(true);
    setError('');
    try {
      await subscribe(email, sport);
      setSubmitted(true);
    } catch (e) {
      setError("Une erreur est survenue. Réessaie dans quelques instants.");
    } finally {
      setLoading(false);
    }
  };

  const f = { fontFamily:"'Bebas Neue',Arial,sans-serif" };
  const b = { fontFamily:"'Barlow',sans-serif" };

  return (
    <div style={{ ...f, background:BG, color:TEXT, minHeight:'100vh', overflowX:'hidden' }}>

      {/* NAV */}
      <nav style={{ display:'flex', justifyContent:'space-between', alignItems:'center', padding:'20px 28px', position:'sticky', top:0, zIndex:100, background:'rgba(8,7,6,0.93)', backdropFilter:'blur(18px)', borderBottom:'1px solid rgba(255,255,255,0.04)' }}>
        <div>
          <div style={{ fontSize:24, fontWeight:900, letterSpacing:'0.2em' }}>BEARCLAW</div>
          <div style={{ fontSize:9, letterSpacing:'0.35em', color:GOLD, ...b, fontWeight:500, marginTop:2 }}>PROTECT YOUR CLAWS</div>
        </div>
        <a href="#liste" style={{ background:GOLD, color:BG, padding:'10px 20px', borderRadius:2, textDecoration:'none', fontSize:11, fontWeight:700, letterSpacing:'0.1em', textTransform:'uppercase', ...b }}>
          Rejoindre la liste
        </a>
      </nav>

      {/* HERO */}
      <section style={{ position:'relative', minHeight:'95vh', display:'flex', alignItems:'flex-end' }}>
        <div style={{ position:'absolute', inset:0, backgroundImage:`linear-gradient(to bottom, rgba(8,7,6,0.4) 0%, rgba(8,7,6,0.72) 55%, ${BG} 100%), url(${HERO_IMG})`, backgroundSize:'cover', backgroundPosition:'center 30%' }} />
        <div style={{ position:'absolute', left:0, top:'15%', width:3, height:'35%', background:`linear-gradient(to bottom, transparent, ${GOLD}, transparent)` }} />
        <div style={{ position:'relative', zIndex:2, padding:'0 28px 72px', maxWidth:720, margin:'0 auto', width:'100%' }}>
          <div style={{ display:'inline-flex', alignItems:'center', gap:10, marginBottom:32 }}>
            <div style={{ width:28, height:1, background:GOLD }} />
            <span style={{ fontSize:10, letterSpacing:'0.25em', color:GOLD, ...b, fontWeight:500 }}>EARLY ACCESS · FRANCE</span>
          </div>
          <h1 style={{ fontSize:'clamp(58px,13vw,110px)', lineHeight:0.92, fontWeight:900, letterSpacing:'0.02em', margin:'0 0 28px', textTransform:'uppercase' }}>
            PROTECT<br/>
            <span style={{ WebkitTextStroke:`2px ${GOLD}`, WebkitTextFillColor:'transparent' }}>YOUR</span><br/>
            CLAWS.
          </h1>
          <p style={{ fontSize:16, lineHeight:1.7, color:MUTED, maxWidth:460, margin:'0 0 40px', ...b, fontWeight:300 }}>
            Le premier coating technique conçu pour les coureurs de trail et de running.
            Fini les ongles noirs, les hématomes, les ongles qui tombent.
          </p>
          <div style={{ display:'flex', flexDirection:'column', gap:12, marginBottom:32, maxWidth:400 }}>
            <a href="#liste" style={{ background:GOLD, color:BG, padding:'17px 32px', borderRadius:2, textDecoration:'none', fontSize:13, fontWeight:700, letterSpacing:'0.1em', textTransform:'uppercase', textAlign:'center', display:'block', ...b }}>
              Rejoindre la liste d'attente
            </a>
            <a href="#probleme" style={{ color:DIMMER, padding:'12px 0', textDecoration:'none', fontSize:11, letterSpacing:'0.12em', textTransform:'uppercase', textAlign:'center', display:'block', ...b }}>
              Comprendre le problème ↓
            </a>
          </div>
        </div>
      </section>

      {/* STATS */}
      <div style={{ borderTop:'1px solid rgba(255,255,255,0.06)', borderBottom:'1px solid rgba(255,255,255,0.06)' }}>
        {stats.map((s,i) => (
          <div key={i} style={{ padding:'32px 28px', borderBottom:'1px solid rgba(255,255,255,0.04)', maxWidth:720, margin:'0 auto', width:'100%' }}>
            <div style={{ fontSize:'clamp(44px,9vw,72px)', fontWeight:900, color:GOLD, letterSpacing:'-0.02em', lineHeight:1, marginBottom:8 }}>{s.value}</div>
            <div style={{ fontSize:11, color:MUTED, letterSpacing:'0.12em', textTransform:'uppercase', ...b, fontWeight:400 }}>{s.label}</div>
          </div>
        ))}
      </div>

      {/* PROBLÈME */}
      <section id="probleme" style={{ padding:'88px 28px', maxWidth:720, margin:'0 auto' }}>
        <div style={{ marginBottom:52 }}>
          <Tag>Le Problème</Tag>
          <h2 style={{ fontSize:'clamp(30px,6vw,52px)', fontWeight:900, lineHeight:1.05, letterSpacing:'0.02em', textTransform:'uppercase' }}>
            Ce qui arrive à ton pied<br/>après 30 km de descente.
          </h2>
        </div>
        <div style={{ position:'relative', borderRadius:4, overflow:'hidden', marginBottom:52, aspectRatio:'16/7' }}>
          <img src={IMG_TRAIL} alt="Trail runner" style={{ width:'100%', height:'100%', objectFit:'cover', display:'block' }} />
          <div style={{ position:'absolute', inset:0, background:'linear-gradient(to top, rgba(8,7,6,0.9) 0%, rgba(8,7,6,0.1) 60%)' }} />
          <div style={{ position:'absolute', bottom:24, left:28, right:28 }}>
            <div style={{ width:24, height:1, background:GOLD, marginBottom:12 }} />
            <p style={{ fontSize:14, lineHeight:1.6, color:'rgba(237,232,223,0.7)', fontStyle:'italic', ...b, fontWeight:300 }}>
              "Presque tous les coureurs ayant un programme marathon sérieux développent au moins un ongle noir."
            </p>
            <p style={{ fontSize:10, color:MUTED, letterSpacing:'0.12em', textTransform:'uppercase', ...b, marginTop:8 }}>— Jeff Galloway, coach running, 45 ans d'expérience</p>
          </div>
        </div>
        {problems.map((p,i) => (
          <div key={i} style={{ display:'flex', gap:28, alignItems:'flex-start', padding:'28px 0', borderBottom:'1px solid rgba(255,255,255,0.05)' }}>
            <div style={{ fontSize:10, fontWeight:700, color:GOLD, letterSpacing:'0.15em', minWidth:28, paddingTop:5, ...b }}>{p.num}</div>
            <div>
              <h3 style={{ fontSize:'clamp(18px,4vw,24px)', fontWeight:900, letterSpacing:'0.05em', margin:'0 0 10px', textTransform:'uppercase' }}>{p.title}</h3>
              <p style={{ fontSize:14, color:MUTED, lineHeight:1.7, margin:0, ...b, fontWeight:300 }}>{p.desc}</p>
            </div>
          </div>
        ))}
      </section>

      {/* SOLUTION */}
      <section style={{ background:BG2, padding:'88px 0', borderTop:'1px solid rgba(255,255,255,0.04)', borderBottom:'1px solid rgba(255,255,255,0.04)' }}>
        <div style={{ maxWidth:720, margin:'0 auto', padding:'0 28px' }}>
          <div style={{ marginBottom:52 }}>
            <Tag>La Solution</Tag>
            <h2 style={{ fontSize:'clamp(30px,6vw,52px)', fontWeight:900, lineHeight:1.05, letterSpacing:'0.02em', textTransform:'uppercase', margin:'0 0 16px' }}>
              Un coating.<br/>Pas un vernis.
            </h2>
            <p style={{ fontSize:15, color:MUTED, lineHeight:1.65, ...b, fontWeight:300 }}>
              BEARCLAW est formulé comme un équipement de protection. La nuance est totale.
            </p>
          </div>
          <div style={{ borderRadius:4, overflow:'hidden', aspectRatio:'16/9', marginBottom:40 }}>
            <img src={IMG_ROCK} alt="Trail montagne" style={{ width:'100%', height:'100%', objectFit:'cover', display:'block' }} />
          </div>
          {features.map((feat,i) => (
            <div key={i} style={{ display:'flex', gap:28, alignItems:'flex-start', padding:'22px 0', borderBottom:'1px solid rgba(255,255,255,0.05)' }}>
              <div style={{ fontSize:10, fontWeight:700, color:GOLD, letterSpacing:'0.15em', minWidth:28, paddingTop:4, ...b }}>{String(i+1).padStart(2,'0')}</div>
              <div>
                <div style={{ fontSize:16, fontWeight:900, letterSpacing:'0.06em', marginBottom:7, textTransform:'uppercase' }}>{feat.title}</div>
                <div style={{ fontSize:13, color:MUTED, lineHeight:1.65, ...b, fontWeight:300 }}>{feat.desc}</div>
              </div>
            </div>
          ))}
        </div>
      </section>

      {/* BANNER */}
      <div style={{ position:'relative', aspectRatio:'21/8', overflow:'hidden' }}>
        <img src={IMG_FINISH} alt="Coureur finish" style={{ width:'100%', height:'100%', objectFit:'cover', display:'block' }} />
        <div style={{ position:'absolute', inset:0, background:'linear-gradient(to right, rgba(8,7,6,0.88) 0%, rgba(8,7,6,0.25) 100%)' }} />
        <div style={{ position:'absolute', inset:0, display:'flex', alignItems:'center', padding:'0 32px' }}>
          <div>
            <div style={{ width:24, height:1, background:GOLD, marginBottom:16 }} />
            <div style={{ fontSize:'clamp(22px,5vw,44px)', fontWeight:900, lineHeight:1.1, letterSpacing:'0.04em', textTransform:'uppercase', maxWidth:380 }}>
              Chaque kilomètre compte.<br/>
              <span style={{ color:GOLD }}>Tes ongles aussi.</span>
            </div>
          </div>
        </div>
      </div>

      {/* LISTE D'ATTENTE */}
      <section id="liste" style={{ background:`linear-gradient(160deg, #100d06 0%, ${BG} 65%)`, padding:'88px 28px', borderTop:`1px solid ${GOLD_BORDER}` }}>
        <div style={{ maxWidth:560, margin:'0 auto' }}>
          <div style={{ marginBottom:40 }}>
            <Tag>Liste d'attente</Tag>
            <h2 style={{ fontSize:'clamp(30px,6vw,48px)', fontWeight:900, lineHeight:1.05, letterSpacing:'0.02em', textTransform:'uppercase', margin:'0 0 16px' }}>
              Sois parmi les premiers.<br/>Façonne le produit.
            </h2>
            <p style={{ fontSize:15, color:MUTED, lineHeight:1.65, ...b, fontWeight:300 }}>
              BEARCLAW est en cours de développement. Laisse ton email pour être informé en avant-première et bénéficier d'un prix fondateur exclusif au lancement.
            </p>
          </div>

          {!submitted ? (
            <div style={{ display:'flex', flexDirection:'column', gap:10 }}>
              <input type="email" placeholder="ton@email.com" value={email}
                onChange={e => setEmail(e.target.value)}
                style={{ background:'rgba(255,255,255,0.04)', border:'1px solid rgba(255,255,255,0.08)', borderRadius:2, padding:'15px 18px', color:TEXT, fontSize:14, ...b, fontWeight:300, width:'100%' }} />
              <select value={sport} onChange={e => setSport(e.target.value)}
                style={{ background:'rgba(255,255,255,0.04)', border:'1px solid rgba(255,255,255,0.08)', borderRadius:2, padding:'15px 18px', color:sport?TEXT:MUTED, fontSize:14, ...b, fontWeight:300, width:'100%' }}>
                <option value="">Ton sport principal</option>
                <option value="Trail running">Trail running</option>
                <option value="Marathon / route">Marathon / route</option>
                <option value="Triathlon">Triathlon</option>
                <option value="Football">Football</option>
                <option value="Autre">Autre</option>
              </select>

              {/* CHECKBOX RGPD */}
              <label style={{ display:'flex', alignItems:'flex-start', gap:12, cursor:'pointer', marginTop:4 }}>
                <input type="checkbox" checked={consent} onChange={e => setConsent(e.target.checked)}
                  style={{ marginTop:3, accentColor:GOLD, width:16, height:16, flexShrink:0, cursor:'pointer' }} />
                <span style={{ fontSize:12, color:MUTED, lineHeight:1.6, ...b, fontWeight:300 }}>
                  J'accepte de recevoir des informations sur BEARCLAW par email. Pas de spam — uniquement les updates produit et l'accès anticipé au lancement. Désinscription possible à tout moment.
                </span>
              </label>

              {error && React.createElement('p', { style:{ fontSize:12, color:'#ff6b6b', ...b, margin:'4px 0' } }, error)}

              <button onClick={submit} disabled={loading}
                style={{ background:loading?'rgba(184,150,62,0.5)':GOLD, color:BG, border:'none', borderRadius:2, padding:'17px 24px', fontSize:12, fontWeight:700, letterSpacing:'0.1em', textTransform:'uppercase', cursor:loading?'not-allowed':'pointer', width:'100%', marginTop:4, ...b, display:'flex', alignItems:'center', justifyContent:'center', gap:10 }}>
                {loading && React.createElement('span', { style:{ display:'inline-block', width:14, height:14, border:'2px solid rgba(8,7,6,0.3)', borderTopColor:BG, borderRadius:'50%', animation:'spin 0.8s linear infinite' } })}
                {loading ? 'Inscription en cours...' : 'Je rejoins la liste d\'attente'}
              </button>
              <p style={{ fontSize:11, color:DIMMER, lineHeight:1.6, textAlign:'center', letterSpacing:'0.04em', ...b, marginTop:6 }}>
                Aucun paiement requis · Tu seras contacté en priorité au lancement
              </p>
            </div>
          ) : (
            <div style={{ background:GOLD_DIM, border:`1px solid ${GOLD_BORDER}`, borderRadius:4, padding:'40px 28px', textAlign:'center' }}>
              <div style={{ width:52, height:52, borderRadius:'50%', background:GOLD, color:BG, display:'flex', alignItems:'center', justifyContent:'center', margin:'0 auto 20px', fontSize:22, fontWeight:900 }}>✓</div>
              <h3 style={{ fontSize:22, fontWeight:900, margin:'0 0 12px', letterSpacing:'0.08em', textTransform:'uppercase' }}>Tu es dans la liste.</h3>
              <p style={{ fontSize:14, color:MUTED, lineHeight:1.65, margin:'0 0 24px', ...b, fontWeight:300 }}>
                On te contacte en premier dès que BEARCLAW est prêt. Partage avec tes partenaires de trail.
              </p>
              <button onClick={() => navigator.clipboard?.writeText(window.location.href)}
                style={{ background:'transparent', border:`1px solid ${GOLD_BORDER}`, color:GOLD, padding:'12px 24px', borderRadius:2, fontSize:11, fontWeight:700, letterSpacing:'0.1em', textTransform:'uppercase', cursor:'pointer', ...b }}>
                Copier le lien à partager
              </button>
            </div>
          )}
        </div>
      </section>

      {/* FAQ */}
      <section style={{ padding:'88px 28px', maxWidth:720, margin:'0 auto' }}>
        <div style={{ marginBottom:52 }}>
          <Tag>FAQ</Tag>
          <h2 style={{ fontSize:'clamp(30px,6vw,52px)', fontWeight:900, lineHeight:1.05, letterSpacing:'0.02em', textTransform:'uppercase' }}>
            Questions directes,<br/>réponses directes.
          </h2>
        </div>
        {faqs.map((faq,i) => (
          <div key={i} style={{ padding:'28px 0', borderBottom:'1px solid rgba(255,255,255,0.05)' }}>
            <h3 style={{ fontSize:'clamp(16px,3vw,20px)', fontWeight:900, margin:'0 0 12px', letterSpacing:'0.04em', textTransform:'uppercase' }}>{faq.q}</h3>
            <p style={{ fontSize:14, color:MUTED, lineHeight:1.7, margin:0, ...b, fontWeight:300 }}>{faq.a}</p>
          </div>
        ))}
      </section>

      {/* FOOTER */}
      <footer style={{ borderTop:'1px solid rgba(255,255,255,0.05)', padding:'48px 28px', textAlign:'center' }}>
        <div style={{ fontSize:24, fontWeight:900, letterSpacing:'0.2em', marginBottom:6 }}>BEARCLAW</div>
        <div style={{ fontSize:9, letterSpacing:'0.35em', color:GOLD, ...b, fontWeight:500, marginBottom:20 }}>PROTECT YOUR CLAWS</div>
        <p style={{ fontSize:11, color:DIMMER, letterSpacing:'0.08em', textTransform:'uppercase', ...b, margin:'0 0 8px' }}>
          Un projet fondé par des sportifs, pour des sportifs · France · 2025
        </p>
        <p style={{ fontSize:12, color:DIMMER, ...b, fontWeight:300, lineHeight:1.7, maxWidth:480, margin:'16px auto 8px' }}>
          Politique de confidentialité — Les données collectées (email, sport pratiqué) sont utilisées uniquement pour t'informer de l'avancement du projet BEARCLAW et du lancement du produit. Elles ne sont jamais vendues ni partagées avec des tiers. Tu peux te désinscrire à tout moment en écrivant à <a href="mailto:contact@bearclaw.fr" style={{ color:GOLD, textDecoration:'none' }}>contact@bearclaw.fr</a>. Responsable du traitement : BEARCLAW, contact@bearclaw.fr.
        </p>
        <p style={{ fontSize:10, color:'rgba(237,232,223,0.12)', ...b, marginTop:16 }}>
          © 2025 BEARCLAW. Produit en cours de développement. Tous droits réservés.
        </p>
      </footer>

    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(App));
  </script>
</body>
</html>
